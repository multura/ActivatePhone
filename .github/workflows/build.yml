name: Компиляция твика

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build ActivatePhone .deb
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Install minimal deps without apt-update
      - name: Install build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends dpkg perl git curl
          # ldid: скачиваем бинарник
          curl -L https://github.com/theos/ldid/releases/download/2.1.2/ldid_2.1.2_linux_amd64.tar.gz -o ldid.tar.gz
          tar -xzf ldid.tar.gz
          sudo mv ldid /usr/local/bin/

      # 3️⃣ Install Theos
      - name: Install Theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      # 4️⃣ Build tweak
      - name: Build tweak
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          make clean
          export ARCHS="arm arm64 arm64e"
          export TARGET=iPhone:clang:14.0
          make package FINALPACKAGE=1

      # 5️⃣ Upload .deb
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ActivatePhone
          path: ./packages/*.deb
