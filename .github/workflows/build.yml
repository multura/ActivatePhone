name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build .deb (arm + arm64 + arm64e)
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          brew install ldid dpkg make

      - name: Build tweak
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          make clean package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ActivatePhone
          path: ./packages/*.deb
